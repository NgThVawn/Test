<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Quản Lý Sinh Viên</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Trang Chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/sinhvien">Sinh Viên</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/monhoc">Môn Học</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/lop">Lớp</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="page-wrap">
    <div class="container">
        <div class="detail-panel">
            <h1 class="detail-title">Thông tin sinh viên</h1>

            <div class="detail-row"><div class="detail-key">MSSV</div><div class="detail-val" th:text="${sinhVien.mssv}"></div></div>
            <div class="detail-row"><div class="detail-key">Họ tên</div><div class="detail-val" th:text="${sinhVien.hoTen}"></div></div>
            <div class="detail-row"><div class="detail-key">Email</div><div class="detail-val"><a th:href="@{'mailto:' + ${sinhVien.email}}" th:text="${sinhVien.email}"></a></div></div>
            <div class="detail-row"><div class="detail-key">Ngày sinh</div><div class="detail-val" th:text="${#temporals.format(sinhVien.ngaySinh, 'dd/MM/yyyy')}"></div></div>
            <div class="detail-row"><div class="detail-key">Lớp</div><div class="detail-val" th:text="${sinhVien.lop != null ? sinhVien.lop.tenLop : 'Chưa phân lớp'}"></div></div>

            <div class="panel-actions">
                <a th:href="@{/sinhvien/edit/{mssv}(mssv=${sinhVien.mssv})}" class="btn btn-outline-warning">Sửa</a>
                <a th:href="@{/sinhvien/delete/{mssv}(mssv=${sinhVien.mssv})}" class="btn btn-outline-danger" onclick="return confirm('Bạn chắc chắn muốn xóa?')">Xóa</a>
                <a href="/sinhvien" class="btn btn-outline-secondary">Quay lại</a>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="footer-clean"><div class="container">2026 - Hệ thống Quản lý Sinh viên</div></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
