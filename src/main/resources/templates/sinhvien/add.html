<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Quản Lý Sinh Viên</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Trang Chủ</a></li>
                <li class="nav-item"><a class="nav-link active" href="/sinhvien">Sinh Viên</a></li>
                <li class="nav-item"><a class="nav-link" href="/monhoc">Môn Học</a></li>
                <li class="nav-item"><a class="nav-link" href="/lop">Lớp</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="page-wrap">
    <div class="container">
        <div class="form-panel">
            <div class="mb-3">
                <h1 class="page-title">Thêm sinh viên</h1>
                <p class="page-subtitle">Nhập đầy đủ thông tin trước khi lưu.</p>
            </div>

            <form action="/sinhvien/add" method="post" th:object="${sinhVien}">
                <div class="mb-3">
                    <label for="mssv" class="form-label">Mã số sinh viên *</label>
                    <input type="text" class="form-control" id="mssv" th:field="*{mssv}" required>
                    <div th:if="${#fields.hasErrors('mssv')}" class="field-error" th:errors="*{mssv}"></div>
                </div>

                <div class="mb-3">
                    <label for="hoTen" class="form-label">Họ tên *</label>
                    <input type="text" class="form-control" id="hoTen" th:field="*{hoTen}" required>
                    <div th:if="${#fields.hasErrors('hoTen')}" class="field-error" th:errors="*{hoTen}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    <div th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="ngaySinh" class="form-label">Ngày sinh *</label>
                    <input type="date" class="form-control" id="ngaySinh" th:field="*{ngaySinh}" required>
                    <div th:if="${#fields.hasErrors('ngaySinh')}" class="field-error" th:errors="*{ngaySinh}"></div>
                </div>

                <div class="mb-3">
                    <label for="lop" class="form-label">Lớp *</label>
                    <select class="form-select" id="lop" th:field="*{lop.maLop}" required>
                        <option value="">-- Chọn lớp --</option>
                        <option th:each="l : ${dsLop}" th:value="${l.maLop}" th:text="${l.tenLop}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('lop')}" class="field-error" th:errors="*{lop}"></div>
                </div>

                <div class="panel-actions">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check2-circle"></i> Lưu</button>
                    <a href="/sinhvien" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer class="footer-clean"><div class="container">2026 - Hệ thống Quản lý Sinh viên</div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
